services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:1.24.1-p1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: fintrack
      DB_PASSWORD: fintrack
      DB_NAME: fintrack
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/server.js"]
    ports:
      - "3000:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=postgresql://fintrack:fintrack@pgbouncer:5432/fintrack?pgbouncer=true
      - DIRECT_URL=postgresql://fintrack:fintrack@postgres:5432/fintrack
      - READ_REPLICA_DATABASE_URL=postgresql://fintrack:fintrack@postgres:5432/fintrack
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://fintrack:fintrack@pgbouncer:5432/fintrack?pgbouncer=true
      - DIRECT_URL=postgresql://fintrack:fintrack@postgres:5432/fintrack
      - READ_REPLICA_DATABASE_URL=postgresql://fintrack:fintrack@postgres:5432/fintrack
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres-data:
  redis-data:
